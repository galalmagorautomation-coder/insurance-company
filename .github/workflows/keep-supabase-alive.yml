name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 8 * * 1,4'  # Every Monday and Thursday at 8am UTC
  workflow_dispatch:        # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://vtfnqjqljregtybjqvvp.supabase.co/rest/v1/agent_data?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}")
          echo "Supabase responded with status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Unexpected status code: $STATUS"
            exit 1
          fi
